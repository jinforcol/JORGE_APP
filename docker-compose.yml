services:
  backend:
    build:
      context: ./aseguradora
      dockerfile: Dockerfile
    container_name: jorge_app_backend
    ports:
      - "9090:9090"

  frontend:
    build:
      context: ./aseguradoraFrondEnd/AseguradoraFront
      dockerfile: Dockerfile
    container_name: jorge_app_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

  frontend-dev:
    build:
      context: ./aseguradoraFrondEnd/AseguradoraFront
      dockerfile: Dockerfile.dev
    container_name: jorge_app_frontend_dev
    working_dir: /app
    volumes:
      - ./aseguradoraFrondEnd/AseguradoraFront:/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - backend
